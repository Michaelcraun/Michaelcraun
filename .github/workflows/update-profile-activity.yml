name: Update profile activity

on:
  schedule:
    - cron: "15 5 * * *" # nightly, 05:15 UTC
  workflow_dispatch:

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Update README activity section
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
        run: node scripts/update-activity.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "Update recent GitHub activity"
          git pull --rebase origin main
          git push
