name: Update annual GitHub stats

on:
  schedule:
    - cron: "30 5 * * 1" # weekly, Mondays at 05:30 UTC
  workflow_dispatch:

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Check out profile repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Update README annual stats section
        env:
          GH_USERNAME: ${{ github.repository_owner }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_FALLBACK_TOKEN: ${{ github.token }}
        run: node scripts/update-stats.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && exit 0
          git commit -m "Update annual GitHub stats"
          git pull --rebase origin main
          git push
